<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Fetch Method using async/await</title>

</head>
<body>
    <h1>The Fetch API</h1>
    <script>
        async function getData() {
            const response = await fetch('https://jsonplaceholder.typicode.com/todos/'); // request data
            const data = await response.json() // parse the json data
            console.log(data);
        }
        getData();
    </script>
</body>
</html>
