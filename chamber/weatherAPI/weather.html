<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Freetown Weather</title>
    <link rel="stylesheet" href="styles/weather.css">
    <script src="scripts/weather.js" defer></script>
    <!-- <script src="scripts/forecast.js" defer></script> -->
</head>
<body>
   
<main>
     <section class="weather-section">
      <div class="weatherCard">
        <h1>Current Weather Forecast</h1>
          <section id="weather-highlight">
          <h2 id="freetown"></h2>
          <p id="temperature"></p>
          <img id="weatherIcon" src="#" alt="weatherIcon">
          </section>
  
          <section id="weather-details">
          <p id="description"></p>
          <p id="humidity"></p>
          <p id="high"></p>
          <p id="low"></p>
          <p id="sunrise"></p>
          <p id="sunset"></p>
          </section> 
  
          <section id="forecasts">
           <h3>Weather Forecast</h3>
           <p id="forecast-1"></p>
           <p id="forecast-2"></p>
           <p id="forecast-3"></p>
          </section>
       </div>
     </section>
     

     
     
</main>
<footer>
  
</footer>
    
</body>
</html>
